server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Make sure browsers see the right MIME type for the manifest, otherwise
    # Chrome silently refuses to treat the PWA as installable.
    types {
        application/manifest+json webmanifest;
    }

    # Service worker: never cached. A stale SW would re-install itself on
    # every visit and keep serving the previous bundle forever.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Manifest: short cache so a manifest edit (icon swap, theme tweak)
    # reaches installed instances on the next launch.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Vite asset bundles are content-hashed, so they're safe to cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback. Any unknown path renders the React shell.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
