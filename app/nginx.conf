server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker: never cached. A stale SW would re-install itself on
    # every visit and keep serving the previous bundle forever.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Manifest: short cache + explicit MIME so Chrome treats the PWA as
    # installable. default_type only overrides the per-location response
    # type — it does NOT touch the global MIME table the way a server-scope
    # `types` block would (which silently breaks .html / .js / .css and
    # makes the browser offer a download instead of rendering).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Vite asset bundles are content-hashed, so they're safe to cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback. Any unknown path renders the React shell.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
